{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-5">
        <div class="luxury-card fade-in">
            <h2 class="text-center mb-4" style="color: var(--gold);">Open Your Boutique</h2>
            <form method="POST">
                <div class="mb-3">
                    <label>Boutique Name</label>
                    <input type="text" name="business_name" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label>Admin Email</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Start 7-Day Free Trial</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
