{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <h2 class="mb-4" style="color: var(--gold);">New Measurement Record</h2>
    <div class="luxury-card">
        <form method="POST">
            <div class="mb-4">
                <label class="form-label">Customer Full Name</label>
                <input type="text" name="customer_name" class="form-control bg-dark text-white border-secondary" required>
            </div>

            <ul class="nav nav-tabs mb-4" id="genderTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#ladies" type="button" onclick="document.getElementById('gender_input').value='Ladies'">Ladies</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#gentlemen" type="button" onclick="document.getElementById('gender_input').value='Gentlemen'">Gentlemen</button>
                </li>
            </ul>

            <input type="hidden" name="gender" id="gender_input" value="Ladies">

            <div class="tab-content mt-3">
                <div class="tab-pane fade show active" id="ladies">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Bust (inches)</label>
                            <input type="number" step="0.1" name="bust" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-4">
                            <label>Waist (inches)</label>
                            <input type="number" step="0.1" name="waist" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-4">
                            <label>Hips (inches)</label>
                            <input type="number" step="0.1" name="hips" class="form-control bg-dark text-white border-secondary">
                        </div>
                    </div>
                </div>
                
                <div class="tab-pane fade" id="gentlemen">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Chest (inches)</label>
                            <input type="number" step="0.1" name="chest" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-4">
                            <label>Shoulder (inches)</label>
                            <input type="number" step="0.1" name="shoulder" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-4">
                            <label>Sleeve Length</label>
                            <input type="number" step="0.1" name="sleeve" class="form-control bg-dark text-white border-secondary">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-gold mt-5 w-100">Save Profile</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
