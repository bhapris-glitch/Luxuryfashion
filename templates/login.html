{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-4">
        <div class="luxury-card fade-in">
            <h2 class="text-center mb-4" style="color: var(--gold);">Boutique Login</h2>
            <form method="POST">
                <div class="mb-3">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Enter Boutique</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('register') }}" class="text-white-50 small">Register New Boutique</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
