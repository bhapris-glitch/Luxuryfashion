{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="luxury-card">
            <h2 style="color: var(--gold);">App Locked</h2>
            <p class="my-4">Your 7-day free trial has expired. To continue managing your luxury boutique and accessing your customer data, please activate your subscription.</p>
            <form action="{{ url_for('create_checkout_session') }}" method="POST">
                <button type="submit" class="btn btn-gold btn-lg w-100">Activate Full Access - $29/mo</button>
            </form>
            <div class="mt-3">
                <small class="text-muted">Secure Autopay via Stripe</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
